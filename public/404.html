<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="not_found_container">
    <p class="not_found_message">Oops! The page you're looking for doesn't exist.</p>        
    <img src="/page_not_found.svg" alt="Not found" class="not_found_image">
    <a href="/" class="not_found_button">Go Back Home</a>
  </div>
</body>
</html>
